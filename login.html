<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/style.css">
<title>Login</title>
</head>


<body>

<h2>Select Login Type</h2>

<!-- Buttons -->
<button type="button" onclick="setRole('user')">User Login</button>
<button type="button" onclick="setRole('mechanic')">Mechanic Login</button>
<button type="button" onclick="setRole('admin')">Admin Login</button>

<br><br>

<!-- LOGIN FORM -->
<form action="backend/login.php" method="POST">

    <!-- ✅ changed name to role -->
    <input type="hidden" name="role" id="role">

    <input type="text" name="email" placeholder="Email or Phone" required><br><br>

    <input type="password" name="password" placeholder="Password" required><br><br>

    <button type="submit">Login</button>

</form>

<a href="signup.html">Create Account</a><br>
<a href="forgot.html">Forgot Password?</a>

<script>
function setRole(userRole){
    document.getElementById("role").value = userRole;
}
</script>

</body>
</html>
