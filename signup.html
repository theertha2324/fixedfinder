<!DOCTYPE html>
<html>
<head>
    <title>Signup - FixedFinder</title>

    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div class="container">

    <div class="signup-box">

        <h2>Create Account</h2>

        <form action="backend/signup.php" method="POST">

            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="phone" placeholder="Phone" required>
            <input type="email" name="email" placeholder="Email">
            
            <div class="password-box">
    <input type="password" name="password" id="signupPassword" placeholder="Password" required>

    <span class="toggle-eye" onclick="toggleSignupPassword()">
        <i class="fa fa-eye"></i>
    </span>
</div>

            <!-- CUSTOM DROPDOWN -->
            <div class="custom-select">

                <div class="select-box" onclick="toggleDropdown()">
                    <span id="selected">Select Role</span>
                </div>

                <div class="options" id="dropdown">
                    <div onclick="selectOption('user')">User</div>
                    <div onclick="selectOption('mechanic')">Mechanic</div>
                </div>

            </div>

            <input type="hidden" name="type" id="type">

            <!-- Mechanic Fields -->
            <div id="mechanicFields" style="display:none;">

                <input type="text" name="garage_location" placeholder="Garage Location">
                <input type="text" name="specialization" placeholder="Specialization">

                <div id="map" style="height:300px; margin-top:10px;"></div>

                <input type="hidden" name="latitude" id="lat">
                <input type="hidden" name="longitude" id="lng">

                <p class="map-text">Click on map to select location</p>

            </div>

            <!-- OTP -->
            <div class="otp-box">
                <input type="text" name="otp" id="otpInput" placeholder="Enter OTP">
                <div class="otp-buttons">
                    <button type="button" onclick="sendOTP()">Send OTP</button>
                    <button type="button" onclick="verifyOTP()">Verify</button>
                </div>
            </div>

            <button type="submit" class="signup-btn">Signup</button>

        </form>

        <p class="links">
            <a href="login.html">Already have account? Login</a>
        </p>

    </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map, marker;

/* SHOW MECHANIC FIELDS + MAP */
function showMechanicFields(){

    let type = document.getElementById("type").value;
    let box = document.getElementById("mechanicFields");

    if(type === "mechanic"){

        box.style.display = "block";

        setTimeout(() => {

            if(!map){

                map = L.map('map').setView([12.9716, 77.5946], 13);

                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                map.on('click', function(e){

                    let lat = e.latlng.lat;
                    let lng = e.latlng.lng;

                    document.getElementById("lat").value = lat;
                    document.getElementById("lng").value = lng;

                    if(marker) map.removeLayer(marker);

                    marker = L.marker([lat, lng]).addTo(map)
                        .bindPopup("Selected Location")
                        .openPopup();
                });

            } else {
                map.invalidateSize(); // 🔥 FIX
            }

        }, 300);

    } else {
        box.style.display = "none";
    }
}

/* OTP DEMO */
let generatedOTP = "";

function sendOTP(){

    let phone = document.querySelector("input[name='phone']").value;

    if(phone.trim() === ""){
        alert("Enter phone first !");
        return;
    }

    fetch("backend/send_otp.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "phone=" + phone
    })
    .then(res => res.text())
    .then(data => {
        alert(data); // shows OTP
    });
}

function verifyOTP(){
    alert("OTP will be verified during signup ");
}

/* DROPDOWN */
function toggleDropdown(){
    document.getElementById("dropdown").classList.toggle("show");
}

function selectOption(value){

    document.getElementById("selected").innerText =
        value.charAt(0).toUpperCase() + value.slice(1);

    document.getElementById("type").value = value;

    document.getElementById("dropdown").classList.remove("show");

    showMechanicFields(); // 🔥 IMPORTANT
}

/* CLOSE DROPDOWN OUTSIDE */
window.onclick = function(e){
    if(!e.target.closest(".custom-select")){
        document.getElementById("dropdown").classList.remove("show");
    }
}
</script>
<script>
function toggleSignupPassword(){

    let pass = document.getElementById("signupPassword");
    let icon = document.querySelector(".password-box .toggle-eye i");

    if(pass.type === "password"){
        pass.type = "text";

        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");

    } else {
        pass.type = "password";

        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>
</body>
</html>
