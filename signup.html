<!DOCTYPE html>
<html>
<head>
    <title>Signup - FixedFinder</title>

    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    
</head>

<body>

<div class="container">
<div class="signup-box">

<h2>Create Account</h2>

<form action="backend/signup.php" method="POST" onsubmit="return validateForm()">

<!-- NAME -->
<input type="text" id="name" name="name" placeholder="Name" required>
<div class="error" id="nameError"></div>

<!-- PHONE -->
<input type="text" id="phone" name="phone" placeholder="Phone" maxlength="10" required>
<div class="error" id="phoneError"></div>

<!-- EMAIL -->
<input type="email" id="email" name="email" placeholder="Email" required>
<div class="error" id="emailError"></div>

<!-- PASSWORD -->
<div class="password-box">
    <input type="password" name="password" id="signupPassword" placeholder="Password" required>

    <span class="toggle-eye" onclick="toggleSignupPassword()">
        <i class="fa fa-eye"></i>
    </span>
</div>

<!-- ROLE -->
<div class="custom-select">
    <div class="select-box" onclick="toggleDropdown()">
        <span id="selected">Select Role</span>
    </div>

    <div class="options" id="dropdown">
        <div onclick="selectOption('user')">User</div>
        <div onclick="selectOption('mechanic')">Mechanic</div>
    </div>
</div>

<input type="hidden" name="type" id="type">

<!-- 🔥 MECHANIC SECTION -->
<div id="mechanicFields" style="display:none; margin-top:15px;">

    <input type="text" name="garage_location" placeholder="Garage Location">
    <input type="text" name="specialization" placeholder="Specialization">

    <div id="map" style="height:250px;"></div>

    <input type="hidden" name="latitude" id="lat">
    <input type="hidden" name="longitude" id="lng">

</div>

<!-- OTP -->
<input type="text" name="otp" id="otpInput" placeholder="Enter OTP" required>

<button type="button" onclick="sendOTP()">Send OTP</button>
<button type="button" onclick="verifyOTP()">Verify</button>

<button type="submit">Signup</button>

</form>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map, marker;

/* FIXED MECHANIC DISPLAY */
function showMechanicFields(){
    let type = document.getElementById("type").value;
    let box = document.getElementById("mechanicFields");

    if(type === "mechanic"){
        box.style.display = "block";

        setTimeout(() => {
            if(!map){
                map = L.map('map').setView([12.9716,77.5946],13);

                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                map.on('click', function(e){
                    let lat = e.latlng.lat;
                    let lng = e.latlng.lng;

                    document.getElementById("lat").value = lat;
                    document.getElementById("lng").value = lng;

                    if(marker) map.removeLayer(marker);

                    marker = L.marker([lat,lng]).addTo(map);
                });
            } else {
                map.invalidateSize();
            }
        },300);

    } else {
        box.style.display = "none";
    }
}

/* DROPDOWN */
function toggleDropdown(){
    document.getElementById("dropdown").classList.toggle("show");
}

function selectOption(value){
    document.getElementById("selected").innerText = value;
    document.getElementById("type").value = value;
    document.getElementById("dropdown").classList.remove("show");

    showMechanicFields();
}

/* PASSWORD */
function toggleSignupPassword(){
    let pass = document.getElementById("signupPassword");
    let icon = document.querySelector(".toggle-eye i");

    if(pass.type === "password"){
        pass.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

/* OTP */
function sendOTP(){
    let phone = document.getElementById("phone").value;

    if(!/^[0-9]{10}$/.test(phone)){
        alert("Enter valid phone ❌");
        return;
    }

    fetch("backend/send_otp.php",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"phone="+phone
    })
    .then(res=>res.text())
    .then(data=>alert(data));
}

function verifyOTP(){
    alert("OTP checked in backend");
}

/* VALIDATION */
function validateForm(){

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("signupPassword").value;

    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!/^[A-Za-z ]{3,}$/.test(name)){
        alert("Invalid name");
        return false;
    }

    if(!/^[0-9]{10}$/.test(phone)){
        alert("Invalid phone");
        return false;
    }

    if(!emailPattern.test(email)){
        alert("Invalid email");
        return false;
    }

    if(pass.length < 6){
        alert("Password too short");
        return false;
    }

    return true;
}
</script>

</body>
</html>
